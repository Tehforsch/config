"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Toni Peter"
email = "mail@tonipeter.de"

[ui]
paginate = "never"
default-command = ["log", "--reversed", "-r", "ancestors(trunk().., 2)", "-T", "builtin_log_oneline"]
# While my tools don't integrate with the new ones
conflict-marker-style = "git"

[revset-aliases]
'default_log' = 'present(@) | ancestors(immutable_heads().., 2) | present(trunk())'
'closest_bookmark(to)' = 'heads(::to & bookmarks())'
'active(rev)' = '(ancestors(rev) | descendants(rev)) ~ immutable()'
'user(x)' = 'author(x) | committer(x)'

'temp()' = 'temp(@)'
'temp(x)' = "ancestors(x) & subject(exact:\"TEMP\")"

'non_roots(x)' = 'x ~ roots(x)'

# https://github.com/jj-vcs/jj/discussions/5812#discussioncomment-12328051
# stack(x, n) is the set of mutable commits reachable from 'x', with 'n'
# parents. 'n' is often useful to customize the display and return set for
# certain operations. 'x' can be used to target the set of 'roots' to traverse,
# e.g. @ is the current stack.
'stack()' = 'ancestors(reachable(@, mutable()), 2)'
'stack(x)' = 'ancestors(reachable(x, mutable()), 2)'
'stack(x, n)' = 'ancestors(reachable(x, mutable()), n)'

'open()' = 'stack(mine() | @, 1)'

[aliases]
# Shorter abbreviations
ab = ["abandon"]
logr = ["log", "--reversed"]
oplog = ["op", "log", "--reversed"]
merge = ["resolve", "--tool", "nvim"]

# Useful logs
stack = ["logr", "-r", "stack(@)"]
difflog = ["logr", "--limit", "50", "-T", "builtin_log_oneline ++ self.diff().stat()"]
wip = ["logr", "-r", "all() & ~untracked_remote_bookmarks() & ~root()::trunk()"]
latest = ["logr", "-r", "latest(all(), 15)", "--no-graph"]

# Other helpful aliases
tug = ["bookmark", "move", "--from", "closest_bookmark(@-)", "--to", "@-"]
retrunk = ["rebase", "-d", "trunk()", "-s", "roots(trunk()..stack(@))"]
track = ["bookmark", "track", "--remote=origin"]
squash_temp = ["squash", "--from", "non_roots(temp())", "--into", "roots(temp())", "-m", "TEMP", "--editor"]
rebase-all = ["rebase", "-p", "trunk()", "-s", "all:roots(trunk()..mutable())"]

[templates]
log = "builtin_log_oneline"

[fix.tools.rustfmt]
enabled = false
command = ["rustfmt", "--emit", "stdout"]
patterns = ["glob:'**/*.rs'"]

[merge-tools.nvim]
program = "nvim"
merge-args = ["-c", "DiffviewOpen -m"]

# Binds are of the form <key sequence> = <command to run>
# To use '=' in a key sequence, substitute it with "Eq": "<Ctrl+Eq>"
# If you wish to bind #, you can wrap the key sequence in quotes: "#" = quit

<C-p> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
<C-r> = :exec /home/toni/projects/config/scripts/sync-mail.sh<Enter>
? = :help keys<Enter>

[messages]
q = :clear<Enter>

k = :prev<Enter>
j = :next<Enter>
<Down> = :next<Enter>
<Up> = :prev<Enter>

<C-d> = :next 50%<Enter>
<C-u> = :prev 50%<Enter>
<PgDn> = :next 100%<Enter>
<PgUp> = :prev 100%<Enter>

gg = :select 0<Enter>
G = :select -1<Enter>

J = :next-folder<Enter>
K = :prev-folder<Enter>
H = :prev-tab<Enter>
L = :next-tab<Enter>

v = :mark -t<Enter>
V = :mark -v<Enter>

mr = :read<Enter>
mu = :unread<Enter>

T = :toggle-threads<Enter>

<tab> = :fold -t<Enter>

zz = :align center<Enter>
zt = :align top<Enter>
zb = :align bottom<Enter>

<Enter> = :view<Enter>
D = :move deleted<Enter>
a = :move archive<Enter>
A = :unmark -a<Enter>:mark -T<Enter>:move archive<Enter>

r = :reply -aq<Enter> # reply all, quoted
R = :reply -q<Enter> # reply sender only, quoted

c = :compose<Enter>

/ = :search<space>

f/ = :filter<space>
fa = :cf<space>
ff = :cf from:"{{index (.From | emails) 0}}"<Enter>
fF = :cf (from:"{{index (.From | emails) 0}}" or to:"{{index (.From | emails) 0}}")<Enter>

n = :next-result<Enter>
N = :prev-result<Enter>
<Esc> = :clear<Enter>

s = :split<Enter>

[messages:folder=drafts]
<Enter> = :recall<Enter>

[messages:folder=deleted]
D = :choose -o y 'Permanently delete?' delete-message<Enter>

[view]
/ = :toggle-key-passthrough<Enter>/
q = :close<Enter>
O = :open<Enter>
o = :open<Enter>
s = :save -ap<Enter>
S = :save -p<Enter>
D = :move deleted<Enter>
a = :move archive<Enter>
mr = :read<Enter>
mu = :unread<Enter>
c = :compose<Enter>

<C-l> = :open-link <space>

F = :forward<Enter>
r = :reply -aq<Enter>
R = :reply -q<Enter>

h = :toggle-headers<Enter>
<C-k> = :prev-part<Enter>
<C-Up> = :prev-part<Enter>
<C-j> = :next-part<Enter>
<C-Down> = :next-part<Enter>
j = :next<Enter>
<Down> = :next<Enter>
<C-Right> = :next<Enter>
k = :prev<Enter>
<Up> = :prev<Enter>
<C-Left> = :prev<Enter>
J = :next-folder<Enter>
K = :prev-folder<Enter>
H = :prev-tab<Enter>
L = :next-tab<Enter>

[view::passthrough]
$noinherit = true
$ex = <C-x>
<Esc> = :toggle-key-passthrough<Enter>

[view:folder=deleted]
D = :choose -o y 'Permanently delete?' delete-message<Enter>

[compose]
# Keybindings used when the embedded terminal is not selected in the compose
# view
$noinherit = true
$ex = <C-x>
$complete = <C-o>
<C-k> = :prev-field<Enter>
<C-Up> = :prev-field<Enter>
<C-j> = :next-field<Enter>
<C-Down> = :next-field<Enter>
<A-p> = :switch-account -p<Enter>
<C-Left> = :switch-account -p<Enter>
<A-n> = :switch-account -n<Enter>
<C-Right> = :switch-account -n<Enter>
<tab> = :next-field<Enter>
<backtab> = :prev-field<Enter>
<C-p> = :prev-tab<Enter>
<C-PgUp> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
<C-PgDn> = :next-tab<Enter>

[compose::editor]
# Keybindings used when the embedded terminal is selected in the compose view
$noinherit = true
$ex = <C-x>
<C-k> = :prev-field<Enter>
<C-Up> = :prev-field<Enter>
<C-j> = :next-field<Enter>
<C-Down> = :next-field<Enter>
<C-p> = :prev-tab<Enter>
<C-PgUp> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
<C-PgDn> = :next-tab<Enter>

[compose::review]
# Keybindings used when reviewing a message to be sent
# Inline comments are used as descriptions on the review screen
s = :send<Enter> # Send
n = :abort<Enter> # Abort (discard message, no confirmation)
x = :encrypt<Enter> # Toggle encryption to all recipients
v = :preview<Enter> # Preview message
p = :postpone<Enter> # Postpone
<C-s> = :postpone<Enter> # Save draft
q = :choose -o d discard abort -o p postpone postpone<Enter> # Abort or postpone
e = :edit<Enter> # Edit (body and headers)
a = :attach<space> # Add attachment
d = :detach<space> # Remove attachment

[terminal]
$noinherit = true
$ex = <C-x>

<C-p> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
<C-PgUp> = :prev-tab<Enter>
<C-PgDn> = :next-tab<Enter>

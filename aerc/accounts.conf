maildir-store = ~/.local/share/mail
maildir-account-path = mailbox
multi-file-strategy = act-dir
outgoing = smtps://toni.peter%40greenbone.net@smtp.mailbox.org:465
outgoing-cred-cmd = /home/toni/projects/config/scripts/getMailboxPw.sh
default = inbox
folders = inbox,archives,sent,drafts,deleted,spam
folders-sort = inbox,archives,sent,drafts,deleted,spam
archive = archive
postpone = drafts
from = Toni Peter <toni.peter@greenbone.net>
aliases = toni.peter@greenbone.net
copy-to = sent


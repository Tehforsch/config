[posteo]
source = notmuch://~/.local/share/mail
query-map = /home/toni/projects/config/aerc/posteo-query-map
maildir-store = ~/.local/share/mail
maildir-account-path = posteo
multi-file-strategy = act-dir
outgoing = smtps://mail@tonipeter.de@smtp.strato.de:465
outgoing-cred-cmd = cat ~/resource/keys/pw/strato_mail
default = inbox
folders = inbox,archive,sent,drafts,deleted
folders-sort = inbox,archive,sent,drafts,deleted
archive = archive
postpone = drafts
from = Toni Peter <mail@tonipeter.de>
aliases = mail@tonipeter.de
copy-to = sent

[mailbox]
source = notmuch://~/.local/share/mail
